

image: python:3.13

options:
  docker: true
  size: 2x

definitions:
  caches:
    uv: ~/.cache/uv

  services:
    docker:
      memory: 7000

pipelines:
  branches:
    my-iframe:
      - step:
          name: Build and Push Chat-UI
          caches:
            - docker
          script:
            - curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            - chmod +x /usr/local/bin/docker-compose
            # - apt-get update && apt-get install -y awscli
            - export DOCKER_BUILDKIT=0
            - export IMAGE_TAG=$BITBUCKET_COMMIT

            # Write .env.prod with repository variables
            - |
              cat > .env.prod << 'EOF'
              OPENAI_BASE_URL=$OPENAI_BASE_URL
              OPENAI_API_KEY=$OPENAI_API_KEY
              AUTOMATIC_LOGIN=$AUTOMATIC_LOGIN
              OPENID_CONFIG=`$OPENID_CONFIG`
              USE_USER_TOKEN=$USE_USER_TOKEN
              APP_BASE=$APP_BASE
              ALLOW_IFRAME=$ALLOW_IFRAME
              COOKIE_NAME=$COOKIE_NAME
              MONGODB_URL=$MONGODB_URL
              MONGODB_DB_NAME=$MONGODB_DB_NAME
              MONGODB_DIRECT_CONNECTION=$MONGODB_DIRECT_CONNECTION
              PUBLIC_APP_NAME=$PUBLIC_APP_NAME
              PUBLIC_APP_ASSETS=$PUBLIC_APP_ASSETS
              PUBLIC_APP_DESCRIPTION=$PUBLIC_APP_DESCRIPTION
              PUBLIC_ORIGIN=$PUBLIC_ORIGIN
              VITE_ALLOWED_HOSTS=$VITE_ALLOWED_HOSTS
              EOF

            # Build
            - echo "Building Docker image for chat-ui..."
            - docker build -f Dockerfile-ci -t chat-ui:$IMAGE_TAG -t chat-ui:latest .

            # Push to AWS ECR
