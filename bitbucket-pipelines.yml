            # Push to Azure ACR
            - echo "Authenticating with Azure ACR..."
            - echo $AZURE_ACR_PASSWORD | docker login -u $AZURE_ACR_USERNAME --password-stdin $AZURE_ACR_LOGIN_SERVER
            - echo "Tagging for Azure chat-ui..."
            - docker tag chat-ui:$BITBUCKET_COMMIT $AZURE_ACR_LOGIN_SERVER/chat-ui:$BITBUCKET_COMMIT
            - docker tag chat-ui:$BITBUCKET_COMMIT $AZURE_ACR_LOGIN_SERVER/chat-ui:latest
            - echo "Pushing to Azure ACR..."
            - docker push $AZURE_ACR_LOGIN_SERVER/chat-ui:$BITBUCKET_COMMIT
            - docker push $AZURE_ACR_LOGIN_SERVER/chat-ui:latest
